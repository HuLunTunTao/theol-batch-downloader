name: Release Draft

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-draft-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release assets
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          mkdir -p release-assets
          zip -r "release-assets/theol-batch-downloader-chrome-${TAG_NAME}.zip" dist/chrome
          zip -r "release-assets/theol-batch-downloader-firefox-${TAG_NAME}.zip" dist/firefox
          cp dist/userscript/theol-batch-downloader.user.js "release-assets/theol-batch-downloader-${TAG_NAME}.user.js"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.user.js
